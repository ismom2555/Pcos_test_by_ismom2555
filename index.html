<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMOM PCOS Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #d46a7e; --bg-color: #fff5f6; }
        body { font-family: 'Chakra Petch', sans-serif; background: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: var(--main-color); margin-bottom: 15px; font-size: 1.4em; }
        p { line-height: 1.5; font-size: 0.95em; color: #555; }
        .instruction { font-size: 0.85em; color: #888; margin-bottom: 15px; background: #fef0f2; padding: 10px; border-radius: 8px; border-left: 4px solid var(--main-color); }
        input[type="text"], input[type="email"], input[type="number"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .option-group { text-align: left; margin: 15px 0; }
        .option-group label { display: block; padding: 10px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-group label:hover { background: #fff0f2; }
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn { flex: 1; background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { background: #eee; color: #666; }
        .progress { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--main-color); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <form id="pcosForm">
        
        <div class="step active">
            <h2>PCOS Check Program</h2>
            <p>โปรแกรมเข้าใจ PCOS ด้วยตนเอง แบบเป็นขั้นตอน<br>จัดจำหน่ายโดย ISMOM (บริษัท ISMOM2555 จำกัด)</p>
            <button type="button" class="btn" onclick="nextStep()">เริ่มโปรแกรม</button>
        </div>

        <div class="step">
            <h2>อีเมลของคุณ</h2>
            <input type="email" name="email" placeholder="example@email.com" required>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep()">ย้อนกลับ</button>
                <button type="button" class="btn" onclick="nextStep()">ต่อไป</button>
            </div>
        </div>

        <div class="step">
            <h2>เงื่อนไขการใช้งาน</h2>
            <div class="option-group">
                <label><input type="checkbox" class="consent-check"> ไม่ใช่การวินิจฉัยโรค</label>
                <label><input type="checkbox" class="consent-check"> ไม่ใช่บริการแพทย์</label>
                <label><input type="checkbox" class="consent-check"> ผลลัพธ์ใช้เพื่อการตัดสินใจเท่านั้น</label>
                <label><input type="checkbox" class="consent-check"> หากฉุกเฉิน จะไปโรงพยาบาลทันที</label>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep()">ย้อนกลับ</button>
                <button type="button" class="btn" onclick="checkConsent()">ยอมรับและไปต่อ</button>
            </div>
        </div>

        <div class="step">
            <h2>ข้อมูลพื้นฐาน</h2>
            <input type="text" name="nickname" placeholder="ชื่อเล่น" required>
            <input type="number" name="age" placeholder="อายุ" required>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep()">ย้อนกลับ</button>
                <button type="button" class="btn" onclick="nextStep()">ต่อไป</button>
            </div>
        </div>

        <div class="step">
            <h2>หมวดที่ 1: รอบประจำเดือน</h2>
            <div class="option-group">
                <label><input type="checkbox" name="m1" value="สม่ำเสมอ"> ไม่สม่ำเสมอ</label>
                <label><input type="checkbox" name="m1" value="รอบยาว"> รอบยาวเกิน 35 วัน</label>
                <label><input type="checkbox" name="m1" value="ไม่มี" onclick="clearOthers(this)"> ไม่มีอาการเหล่านี้</label>
            </div>
            <div class="btn-group"><button type="button" class="btn btn-back" onclick="prevStep()">ย้อนกลับ</button><button type="button" class="btn" onclick="nextStep()">ต่อไป</button></div>
        </div>

        <div class="step">
            <h2>การชำระเงิน (790.-)</h2>
            <p>ธนาคารออมสิน: 020337687014 (อีสมัม2555)</p>
            <div class="option-group">
                <label><input type="radio" name="pay_status" value="paid" onclick="toggleSlip(true)"> ชำระเงินแล้ว</label>
            </div>
            <div id="slipSection" style="display:none;">
                <input type="file" id="slipFile" accept="image/*">
                <input type="text" name="transfer_time" placeholder="เวลาที่โอน">
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep()">ย้อนกลับ</button>
                <button type="submit" class="btn" id="submitBtn">ส่งข้อมูล</button>
            </div>
        </div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzh0inVSayRyYGiKCki8TA3Ag-zZ96sATnKHekqjIz4ng7_7fYmd-EpgfSpD53E1eVU/exec';
    let currentStep = 0;
    const steps = document.querySelectorAll('.step');
    const form = document.getElementById('pcosForm'); // แก้ไข: ประกาศตัวแปร form ให้ถูกต้อง

    function updateProgress() {
        document.getElementById('progressBar').style.width = ((currentStep / (steps.length - 1)) * 100) + '%';
    }

    function nextStep() {
        steps[currentStep].classList.remove('active');
        currentStep++;
        steps[currentStep].classList.add('active');
        updateProgress();
    }

    function prevStep() {
        steps[currentStep].classList.remove('active');
        currentStep--;
        steps[currentStep].classList.add('active');
        updateProgress();
    }

    function checkConsent() {
        const checks = document.querySelectorAll('.consent-check');
        if(Array.from(checks).every(c => c.checked)) nextStep();
        else alert('กรุณายอมรับเงื่อนไข');
    }

    function toggleSlip(show) {
        document.getElementById('slipSection').style.display = show ? 'block' : 'none';
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "กำลังส่งข้อมูล (โปรดรอสักครู่)...";

        const fileInput = document.getElementById('slipFile');
        const file = fileInput.files[0];

        const sendData = (base64 = "", type = "", name = "") => {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // ดึงข้อมูล checkbox
            ['m1','m2','m3','m4','m6'].forEach(k => {
                const vals = Array.from(document.querySelectorAll(`input[name="${k}"]:checked`)).map(c => c.value);
                data[k] = vals.join(', ');
            });

            data.fileContent = base64;
            data.fileType = type;
            data.fileName = name;

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(data) })
            .then(() => {
                alert('ส่งข้อมูลสำเร็จ!');
                location.reload();
            }).catch(() => {
                alert('เกิดข้อผิดพลาด');
                btn.disabled = false;
            });
        };

        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => sendData(reader.result.split(',')[1], file.type, file.name);
        } else {
            sendData();
        }
    });
</script>
</body>
</html>
