<script>
    // แก้ไข URL ให้เรียบร้อยแล้ว
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzh0inVSayRyYGiKCki8TA3Ag-zZ96sATnKHekqjIz4ng7_7fYmd-EpgfSpD53E1eVU/exec';
    
    let currentStep = 0;
    const steps = document.querySelectorAll('.step');
    const form = document.getElementById('pcosForm');
    let isPaid = false;

    function updateProgress() {
        document.getElementById('progressBar').style.width = ((currentStep / (steps.length - 1)) * 100) + '%';
    }

    function setPayment(val) { isPaid = val; }

    function validateAndNext(btn) {
        const step = steps[currentStep];
        const type = step.getAttribute('data-validate');
        let isValid = false;

        if (type === 'input') {
            const inputs = step.querySelectorAll('input[required]');
            isValid = Array.from(inputs).every(i => i.value.trim() !== "");
            if(step.querySelector('input[type="email"]')) {
                isValid = isValid && step.querySelector('input[type="email"]').checkValidity();
            }
        } else if (type === 'all-checkbox') {
            const boxes = step.querySelectorAll('.consent-cb');
            isValid = Array.from(boxes).every(b => b.checked);
        } else if (type === 'checkbox' || type === 'radio') {
            isValid = step.querySelectorAll('input:checked').length > 0;
        } else { isValid = true; }

        if (isValid) {
            step.querySelector('.error-msg').style.display = 'none';
            if (currentStep === 12) { 
                steps[currentStep].classList.remove('active');
                currentStep = isPaid ? 13 : 14; 
                steps[currentStep].classList.add('active');
                updateProgress();
            } else {
                nextStep();
            }
        } else {
            step.querySelector('.error-msg').style.display = 'block';
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 400);
        }
    }

    function nextStep() {
        steps[currentStep].classList.remove('active');
        currentStep++;
        steps[currentStep].classList.add('active');
        updateProgress();
        window.scrollTo(0,0);
    }

    function prevStep() {
        steps[currentStep].classList.remove('active');
        if (currentStep >= 13) currentStep = 12;
        else currentStep--;
        steps[currentStep].classList.add('active');
        updateProgress();
    }

    function clearOthers(el) {
        if(el.checked) {
            document.querySelectorAll(`input[name="${el.name}"]`).forEach(cb => { if(cb !== el) cb.checked = false; });
        }
    }

    // ปรับปรุงส่วนการส่งข้อมูล (Submit)
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.innerHTML = "กำลังส่งข้อมูล (ห้ามปิดหน้าจอ)...";
        
        const fileInput = document.getElementById('slipFile');
        const file = fileInput.files[0];

        const sendToGoogle = (base64 = "", type = "", name = "") => {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // รวบรวมค่าจาก Checkbox หมวดต่างๆ
            ['m1','m2','m3','m4','m6'].forEach(k => {
                const checked = Array.from(document.querySelectorAll(`input[name="${k}"]:checked`)).map(c => c.value);
                data[k] = checked.join(', ');
            });

            data.fileContent = base64; 
            data.fileType = type; 
            data.fileName = name;

            // ใช้ URLSearchParams เพื่อให้ Apps Script รับแบบ POST ได้ง่ายที่สุด
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new URLSearchParams(data) 
            })
            .then(() => { 
                alert('ส่งข้อมูลและหลักฐานสำเร็จ! ขอบคุณครับ'); 
                location.reload(); 
            })
            .catch((err) => { 
                console.error(err);
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล'); 
                btn.disabled = false; 
                btn.innerHTML = "ยืนยันและส่งข้อมูล"; 
            });
        };

        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => sendToGoogle(reader.result.split(',')[1], file.type, file.name);
        } else { 
            sendToGoogle(); 
        }
    });
</script>
