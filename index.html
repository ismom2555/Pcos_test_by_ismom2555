<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMOM PCOS Check</title>
    <style>
        body { font-family: sans-serif; background: #fff5f6; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: #d46a7e; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ISMOM PCOS Check</h2>
        <form id="pcosForm">
            <input type="email" name="email" placeholder="อีเมลของคุณ" required style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="text" name="nickname" placeholder="ชื่อเล่น" required style="width:90%; padding:10px; margin-bottom:10px;">
            <p>แนบสลิปโอนเงิน (790.-)</p>
            <input type="file" id="slip" accept="image/*" required>
            <button type="submit" class="btn">ส่งข้อมูล</button>
        </form>
    </div>

    <script>
        document.getElementById('pcosForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const scriptURL = https://script.google.com/macros/s/AKfycbzh0inVSayRyYGiKCki8TA3Ag-zZ96sATnKHekqjIz4ng7_7fYmd-EpgfSpD53E1eVU/exec
            
            btn.innerText = "กำลังส่ง...";
            btn.disabled = true;

            const fileInput = document.getElementById('slip');
            const reader = new FileReader();
            reader.onload = function(event) {
                const finalData = {
                    email: e.target.email.value,
                    nickname: e.target.nickname.value,
                    fileContent: event.target.result.split(',')[1],
                    fileName: fileInput.files[0].name
                };

                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams(finalData)
                }).then(() => {
                    alert("ส่งสำเร็จ!");
                    location.reload();
                }).catch(() => alert("เกิดข้อผิดพลาด"));
            };
            reader.readAsDataURL(fileInput.files[0]);
        });
    </script>
    <script>
  const scriptURL = 'ใส่_WEB_APP_URL_ที่ได้จาก_APPS_SCRIPT_ตรงนี้';
  const form = document.querySelector('form'); // ตรวจสอบว่าใน HTML มีแท็ก <form>

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // เปลี่ยนข้อความที่ปุ่มเพื่อบอกผู้ใช้ว่ากำลังส่ง
    const submitButton = form.querySelector('button[type="submit"]');
    submitButton.disabled = true;
    submitButton.innerHTML = "กำลังส่งข้อมูล...";

    const fileInput = document.querySelector('input[type="file"]');
    const file = fileInput.files[0];

    // ถ้ามีการแนบไฟล์รูป
    if (file) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function() {
        const base64Data = reader.result.split(',')[1];
        sendData(base64Data, file.type, file.name);
      };
    } else {
      sendData(null, null, null);
    }

    function sendData(base64Data, fileType, fileName) {
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => { data[key] = value });

      // เพิ่มข้อมูลไฟล์ลงไปในก้อนที่จะส่ง
      data.fileContent = base64Data;
      data.fileType = fileType;
      data.fileName = fileName;

      // ส่งข้อมูลไปที่ Google Apps Script
      fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors', // สำคัญ: เพื่อไม่ให้ติดปัญหาเรื่องความปลอดภัยเบื้องต้น
        body: new URLSearchParams(data) 
      })
      .then(() => {
        alert('ส่งข้อมูลสำเร็จ! ระบบจะส่งผลให้ทางอีเมลโดยเร็วที่สุด');
        window.location.reload(); // รีโหลดหน้าใหม่เพื่อให้พร้อมสำหรับคนต่อไป
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert('เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
        submitButton.disabled = false;
        submitButton.innerHTML = "ส่งข้อมูล";
      });
    }
  });
</script>
</body>
</html>
